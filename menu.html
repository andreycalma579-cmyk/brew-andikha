<!DOCTYPE html>
<html>
<head>
    <title>Brew Andikha</title>
    <style>
        /* Ito ang nagbibigay ng dating kulay sa iyong design */
        body { margin: 0; font-family: sans-serif; }
        .header { background-color: #4e4444; color: white; padding: 20px; }
        .menu-container { text-align: center; margin-top: 20px; }
        
        /* Box design */
        .menu-item { 
            margin: 10px; padding: 15px; border: 1px solid #ccc; 
            display: inline-block; width: 140px; text-align: center; 
        }
    </style>
</head>
<body>

    <!-- Ang dark header -->
    <div class="header">
        <h1>Brew Andikha</h1>
    </div>

    <h2 style="text-align: center;">Coffee Menu</h2>

    <div class="menu-container">
        <div class="menu-item">Americano<br>P140<br><button onclick="orderItem('Americano', 140)">Order</button></div>
        <div class="menu-item">Mocha<br>P180<br><button onclick="orderItem('Mocha', 180)">Order</button></div>
        <div class="menu-item">Caramel Macchiato<br>P190<br><button onclick="orderItem('Caramel Macchiato', 190)">Order</button></div>
        <div class="menu-item">Vanilla Latte<br>P175<br><button onclick="orderItem('Vanilla Latte', 175)">Order</button></div>
        <div class="menu-item">Cold Brew<br>P160<br><button onclick="orderItem('Cold Brew', 160)">Order</button></div>
        <div class="menu-item">Chocolate Frappé<br>P200<br><button onclick="orderItem('Chocolate Frappé', 200)">Order</button></div>
    </div>

    <h2 id="resulta" style="text-align: center; color: blue;"></h2>

    <script>
        function orderItem(pangalan, presyo) {
            document.getElementById("resulta").innerHTML = 
                "Ang napili mo ay " + pangalan + ". Presyo: P" + presyo + ".";
        }
    </script>

</body>
</html>
<style>
    /* 1. ANIMATION STYLE */
    button {
        background-color: #4e4444;
        color: white;
        border: none;
        padding: 8px 16px;
        cursor: pointer;
        transition: all 0.2s ease; /* Ito ang nagpapaganda ng transition */
    }

    /* Kapag pinindot, liliit nang konti ang button */
    button:active {
        transform: scale(0.9);
        background-color: #2c2727;
    }

    /* Visual feedback sa button */
    .btn-clicked {
        background-color: #27ae60 !important; /* Magiging green kapag na-click */
    }
</style>

<script>
    // 2. ANIMATION LOGIC
    function orderItem(pangalan, presyo, btnElement) {
        // I-update ang text
        document.getElementById("resulta").innerHTML = 
            "Successfully added: " + pangalan + " (P" + presyo + ")";

        // Baguhin ang kulay ng button para maging green (feedback)
        btnElement.classList.add('btn-clicked');
        
        // Ibalik sa dati ang kulay pagkatapos ng 0.5 segundo
        setTimeout(function() {
            btnElement.classList.remove('btn-clicked');
        }, 500);
    }
</script>
