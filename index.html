<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brew Andikha Coffee</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f5f1eb;
    margin:0;
    padding:0;
}

/* NAVIGATION */
nav{
    background-color:#4b2e2e;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
    margin:0;
}

nav a{
    color:white;
    text-decoration:none;
}

.hero{
    text-align:center;
    padding:50px;
    background:#e6d5c3;
}

.hero h2{
    color:#4b2e2e;
}

.footer-links{
    text-align:center;
    padding:15px;
}

/* MENU SECTION */
.menu-section{
    padding:20px;
}

h1{
    text-align:center;
    color:#4b2e2e;
}

.container{
    display:flex;
    gap:20px;
}

.sidebar{
    width:230px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    height:fit-content;
}

.logo{
    background-color:#4b2e2e;
    color:white;
    text-align:center;
    padding:30px 10px;
    border-radius:10px;
    font-size:35px;
    font-weight:bold;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

.submit-btn{
    width:100%;
    padding:12px;
    background-color:brown;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.menu{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.menu-item{
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    width:220px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.menu-item.active{
    transform:scale(1.05);
    box-shadow:0 0 20px brown;
    border:3px solid brown;
}

.menu-item img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.order-btn{
    background-color:brown;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

#result{
    text-align:center;
    margin-top:30px;
    font-size:25px;
    color:blue;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- HOME SECTION -->


<section class="hero" id="home">
    <h2>Welcome to Brew Andikha!</h2>
    <p>This is my website.</p>
</section>

<div class="footer-links">
    <a href="#menu">Menu</a> |
    <a href="#about">About Us</a> |
    <a href="#contact">Order Now</a>
</div>

<!-- MENU SECTION -->
<section class="menu-section" id="menu">

<h1>Coffee Menu</h1>

<div class="container">

    <div class="sidebar">

        <div class="logo">
            Brew<br>Andikha<br>Coffee
        </div>

        <h2>Choose Coffee</h2>

        <input type="text" id="customer" placeholder="Pangalan">

        <select id="coffee">
            <option>Americano</option>
            <option>Mocha</option>
            <option>Caramel Macchiato</option>
            <option>Vanilla Latte</option>
            <option>Cold Brew</option>
            <option>Chocolate Frappe</option>
        </select>

        <button class="submit-btn" onclick="submitOrder()">
            Submit Order
        </button>

    </div>

    <div class="menu">

        <div class="menu-item" id="americano">
            <img src="46a6f033-e813-4fde-9743-84b034e76758.jpg">
            <h3>Americano</h3>
            <p>₱140</p>
            <button class="order-btn"
            onclick="selectCoffee('Americano','americano')">
            Order
            </button>
        </div>

        <div class="menu-item" id="mocha">
            <img src="66fe24e9-2eb0-4848-8a84-934c75f5b318.jpg">
            <h3>Mocha</h3>
            <p>₱180</p>
            <button class="order-btn"
            onclick="selectCoffee('Mocha','mocha')">
            Order
            </button>
        </div>

        <div class="menu-item" id="caramel">
            <img src="28a4cfa1-de22-4be5-b4fa-8bbea418a2dc.jpg">
            <h3>Caramel Macchiato</h3>
            <p>₱190</p>
            <button class="order-btn"
            onclick="selectCoffee('Caramel Macchiato','caramel')">
            Order
            </button>
        </div>

        <div class="menu-item" id="vanilla">
            <img src="19f15237-cbd5-4db6-b45c-9ff7e8f0304b.jpg">
            <h3>Vanilla Latte</h3>
            <p>₱175</p>
            <button class="order-btn"
            onclick="selectCoffee('Vanilla Latte','vanilla')">
            Order
            </button>
        </div>

        <div class="menu-item" id="coldbrew">
            <img src="2940bb46-a5dc-43f8-82a4-12d93fdc152f.jpg">
            <h3>Cold Brew</h3>
            <p>₱160</p>
            <button class="order-btn"
            onclick="selectCoffee('Cold Brew','coldbrew')">
            Order
            </button>
        </div>

        <div class="menu-item" id="frappe">
            <img src="55b6f6bd-e20e-4fcd-901a-de11fc4e571c.jpg">
            <h3>Chocolate Frappe</h3>
            <p>₱200</p>
            <button class="order-btn"
            onclick="selectCoffee('Chocolate Frappe','frappe')">
            Order
            </button>
        </div>

    </div>

</div>

<p id="result"></p>

</section>

<script>
function removeActive(){
    var items = document.querySelectorAll(".menu-item");
    items.forEach(function(item){
        item.classList.remove("active");
    });
}

function selectCoffee(coffee,id){
    removeActive();
    document.getElementById(id).classList.add("active");
    document.getElementById("coffee").value = coffee;
    document.getElementById("result").innerHTML =
    coffee + " selected";
}

function submitOrder(){
    var customer =
    document.getElementById("customer").value;

    var coffee =
    document.getElementById("coffee").value;

    document.getElementById("result").innerHTML =
    "Thank you " + customer +
    "! Your order is " + coffee;
}
</script>

</body>
</html>
