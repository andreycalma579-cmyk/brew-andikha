<!DOCTYPE html>
<html>
<head>
    <title>Brew Andikha Coffee</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f5f1eb;
            margin: 0;
            padding: 20px;
        }

        nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #4b2e2e;
            color: white;
        }

        nav ul{
            list-style: none;
            display: flex;
            gap: 15px;
        }

        nav a{
            color: white;
            text-decoration: none;
        }

        h1{
            text-align: center;
            color: #4b2e2e;
        }

        .hero{
            text-align: center;
            padding: 40px;
        }

        button{
            padding: 10px 20px;
            background: brown;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .container{
            display: flex;
            gap: 20px;
        }

        .sidebar{
            width: 230px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .logo{
            background-color: #4b2e2e;
            color: white;
            text-align: center;
            padding: 30px 10px;
            border-radius: 10px;
            font-size: 35px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .menu{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .menu-item{
            background: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            width: 220px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .menu-item.active{
            transform: scale(1.1);
            box-shadow: 0 0 20px brown;
            border: 3px solid brown;
        }

        .menu-item img{
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .order-btn{
            background-color: brown;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        #result{
            text-align: center;
            margin-top: 30px;
            font-size: 25px;
            color: blue;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- NAVIGATION -->
<nav>
    <h1>Brew Andikha</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h2>Fresh Coffee Everyday</h2>
    <p>Enjoy the best coffee in town.</p>
    <a href="#menu"><button>Order Now</button></a>
</section>

<h1>Coffee Menu</h1>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            Brew<br>Andikha<br>Coffee
        </div>

        <h2>Choose Coffee</h2>

        <input type="text" id="customer" placeholder="Pangalan">

        <select id="coffee">
            <option>Americano</option>
            <option>Mocha</option>
            <option>Caramel Macchiato</option>
            <option>Vanilla Latte</option>
            <option>Cold Brew</option>
            <option>Chocolate Frappe</option>
        </select>

        <button onclick="submitOrder()">Submit Order</button>
    </div>

    <!-- MENU -->
    <div class="menu">

        <div class="menu-item" id="americano">
            <img src="46a6f033-e813-4fde-9743-84b034e76758.jpg">
            <h3>Americano</h3>
            <p>₱140</p>
            <button class="order-btn" onclick="selectCoffee('Americano','americano')">Order</button>
        </div>

        <div class="menu-item" id="mocha">
            <img src="66fe24e9-2eb0-4848-8a84-934c75f5b318.jpg">
            <h3>Mocha</h3>
            <p>₱180</p>
            <button class="order-btn" onclick="selectCoffee('Mocha','mocha')">Order</button>
        </div>

        <div class="menu-item" id="caramel">
            <img src="28a4cfa1-de22-4be5-b4fa-8bbea418a2dc.jpg">
            <h3>Caramel Macchiato</h3>
            <p>₱190</p>
            <button class="order-btn" onclick="selectCoffee('Caramel Macchiato','caramel')">Order</button>
        </div>

    </div>
</div>

<p id="result"></p>

<script>
function removeActive(){
    document.querySelectorAll(".menu-item")
    .forEach(item => item.classList.remove("active"));
}

function selectCoffee(coffee, id){
    removeActive();
    document.getElementById(id).classList.add("active");
    document.getElementById("coffee").value = coffee;

    document.getElementById("result").innerText =
        coffee + " selected";
}

function submitOrder(){
    let customer = document.getElementById("customer").value;
    let coffee = document.getElementById("coffee").value;

    document.getElementById("result").innerText =
        `Thank you ${customer}! Your order is ${coffee}`;
}
</script>

</body>
</html>
